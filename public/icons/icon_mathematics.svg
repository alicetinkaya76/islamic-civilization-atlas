  <!-- Equals -->
  <line x1="27" y1="16" x2="35" y2="16"/>
  <line x1="27" y1="20" x2="35" y2="20"/>
  <!-- x² -->
  <line x1="16" y1="29" x2="22" y2="37"/>
  <line x1="22" y1="29" x2="16" y2="37"/>
  <text x="23" y="32" font-size="7" fill="#3b82f6" stroke="none" font-family="serif">²</text>
